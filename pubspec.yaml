name: mind_maze
description: Mind Maze — medieval castle trivia game inspired by Microsoft Encarta.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.2.2
  webview_flutter: ^4.7.0
  webview_flutter_android: ^4.11.0
  google_fonts: ^8.0.2
  lottie: ^3.3.3
  flutter_animate: ^4.5.0
  shared_preferences: ^2.5.5
  http: ^1.2.1
  url_launcher: ^6.3.0
  path_provider: ^2.1.4
  open_filex: ^4.7.0
  package_info_plus: ^10.0.0
  flutter_markdown: ^0.7.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/questions/topics/
    - assets/questions/sources/
