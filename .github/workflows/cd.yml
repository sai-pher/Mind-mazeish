name: CD — Build & Publish APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build APK & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test --reporter expanded

      # Build number = CI run number (monotonically increasing = Android update-in-place)
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks

      - name: Build release APK
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          FEEDBACK_PAT: ${{ secrets.FEEDBACK_GITHUB_PAT }}
          KEYSTORE_PATH: ${{ github.workspace }}/android/upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk \
            --release \
            --build-number=$BUILD_NUMBER \
            --build-name=1.0.$BUILD_NUMBER \
            --dart-define=FEEDBACK_GITHUB_PAT=$FEEDBACK_PAT \
            --obfuscate \
            --split-debug-info=build/debug-symbols

      - name: Name APK with version
        id: apk
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          VERSION="1.0.${BUILD_NUMBER}"
          APK_NAME="mind-mazeish-v${VERSION}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk \
             "build/app/outputs/flutter-apk/${APK_NAME}"
          echo "name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "path=build/app/outputs/flutter-apk/${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Generate release body
        id: release_body
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          python3 - <<'PYEOF'
          import re, os
          with open('release_notes.md') as f:
              content = f.read()
          m = re.search(r'## Unreleased\n(.*?)(?=\n## |\Z)', content, re.DOTALL)
          notes = m.group(1).strip() if m else ''
          version = f"1.0.{os.environ['BUILD_NUMBER']}"
          body = (
              f"## Mind Mazeish — v{version}\n\n"
              f"{notes}\n\n"
              f"---\n"
              f"### Installation\n"
              f"1. Download the APK below\n"
              f"2. On your device: **Settings → Apps → Install unknown apps**\n"
              f"3. Open the APK to install (or update if you have an older version)\n\n"
              f"> Signed with the release keystore. No API key required."
          )
          with open('release_body.md', 'w') as f:
              f.write(body)
          PYEOF

      # Tag each release with a proper version (e.g. v1.0.42)
      # Also maintains the rolling latest-build tag for in-app update checks.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.apk.outputs.version }}
          name: "Mind Mazeish ${{ steps.apk.outputs.version }}"
          body_path: release_body.md
          prerelease: false
          make_latest: true
          files: ${{ steps.apk.outputs.path }}

      - name: Update rolling latest-build tag
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest-build
          name: "Latest Build"
          body: "Always points to the most recent APK. See versioned releases for changelogs."
          prerelease: true
          make_latest: false
          files: ${{ steps.apk.outputs.path }}

      - name: Archive release notes and reset Unreleased
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          python3 scripts/archive_release_notes.py "1.0.${BUILD_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release_notes.md
          git commit -m "chore: archive release notes for v1.0.${BUILD_NUMBER} [skip ci]"
          git push origin main
