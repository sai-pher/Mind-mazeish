name: CD — Build & Publish APK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Optional release notes'
        required: false
        default: ''

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build APK & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test --reporter expanded

      # Build number = CI run number (monotonically increasing = Android update-in-place)
      - name: Build release APK
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          flutter build apk \
            --release \
            --build-number=$BUILD_NUMBER \
            --build-name=1.0.$BUILD_NUMBER \
            --obfuscate \
            --split-debug-info=build/debug-symbols

      - name: Name APK with version
        id: apk
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          VERSION="1.0.${BUILD_NUMBER}"
          APK_NAME="mind-mazeish-v${VERSION}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk \
             "build/app/outputs/flutter-apk/${APK_NAME}"
          echo "name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "path=build/app/outputs/flutter-apk/${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Generate release body
        id: release_body
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | head -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-decorate | head -20)
          else
            LOG=$(git log HEAD --oneline --no-decorate | head -20)
          fi
          MANUAL_NOTES="${{ github.event.inputs.release_notes }}"
          cat <<EOF > release_body.md
          ## Mind Mazeish — v1.0.${BUILD_NUMBER}

          **Commit:** \`${{ github.sha }}\`
          **Built:** $(date -u '+%Y-%m-%d %H:%M UTC')

          $( [ -n "$MANUAL_NOTES" ] && echo -e "### Notes\n${MANUAL_NOTES}\n" )
          ### Changes since last release
          \`\`\`
          ${LOG}
          \`\`\`

          ---
          ### Installation
          1. Download **${{ steps.apk.outputs.name }}** below
          2. On your device: **Settings → Apps → Install unknown apps**
          3. Open the APK to install (or update if you have an older version)

          > Signed with the debug keystore — for testing only. No API key required.
          EOF

      # Tag each release with a proper version (e.g. v1.0.42)
      # Also maintains the rolling latest-build tag for in-app update checks.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.apk.outputs.version }}
          name: "Mind Mazeish ${{ steps.apk.outputs.version }}"
          body_path: release_body.md
          prerelease: false
          make_latest: true
          files: ${{ steps.apk.outputs.path }}

      - name: Update rolling latest-build tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Latest Build"
          body: "Always points to the most recent APK. See versioned releases for changelogs."
          prerelease: true
          make_latest: false
          files: ${{ steps.apk.outputs.path }}
