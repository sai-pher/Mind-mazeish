name: CD — Build & Publish APK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Optional release notes'
        required: false
        default: ''

concurrency:
  group: cd-main
  cancel-in-progress: false   # never cancel an in-progress release build

jobs:
  build-and-release:
    name: Build APK & Publish Release
    runs-on: ubuntu-latest

    # Required to create/update GitHub releases and push the APK
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history for release notes

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Create .env
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > .env

      - name: Install dependencies
        run: flutter pub get

      # Gate: tests must pass before we build a publishable APK
      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test --reporter expanded

      # Build a release APK.
      # build.gradle uses signingConfigs.debug, so no keystore secret is needed.
      # This produces a properly optimised build signed with the debug key —
      # suitable for sideloading and device testing.
      - name: Build release APK
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-symbols

      # Stamp the APK with a short commit SHA for traceability
      - name: Rename APK
        id: apk
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          APK_NAME="mind-maze-${SHORT_SHA}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk \
             "build/app/outputs/flutter-apk/${APK_NAME}"
          echo "name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "path=build/app/outputs/flutter-apk/${APK_NAME}" >> "$GITHUB_OUTPUT"

      # Always upload as a workflow artifact (downloadable for 30 days from
      # the Actions run page even without a GitHub release).
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      # Build a human-readable commit log since the previous release
      - name: Generate release body
        id: release_body
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | head -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-decorate | head -20)
          else
            LOG=$(git log HEAD --oneline --no-decorate | head -20)
          fi

          MANUAL_NOTES="${{ github.event.inputs.release_notes }}"

          cat <<EOF > release_body.md
          ## Mind Maze — Test Build

          **Commit:** \`${{ github.sha }}\`
          **Branch:** \`${{ github.ref_name }}\`
          **Built:** $(date -u '+%Y-%m-%d %H:%M UTC')

          $( [ -n "$MANUAL_NOTES" ] && echo -e "### Notes\n${MANUAL_NOTES}\n" )
          ### Changes since last release
          \`\`\`
          ${LOG}
          \`\`\`

          ---
          ### Installation
          1. Download **${{ steps.apk.outputs.name }}** below
          2. On your Android device: **Settings → Apps → Install unknown apps**
          3. Open the downloaded APK to install
          4. Add your \`ANTHROPIC_API_KEY\` is baked into the build if the
             \`ANTHROPIC_API_KEY\` secret was set in the repository; otherwise
             API calls will fail gracefully with an error card.

          > Signed with the debug keystore — for testing only.
          EOF

      # Creates or updates the rolling `latest-build` pre-release tag.
      # The APK on this release always reflects the current HEAD of main.
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Latest CI Build"
          body_path: release_body.md
          prerelease: true
          make_latest: false
          files: ${{ steps.apk.outputs.path }}
