name: CD — Build & Deploy Web (GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-web-main
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build Flutter Web & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test --reporter expanded

      - name: Build web
        env:
          FEEDBACK_PAT: ${{ secrets.FEEDBACK_GITHUB_PAT }}
        run: flutter build web --release --base-href /Mind-mazeish/ --dart-define=FEEDBACK_GITHUB_PAT=$FEEDBACK_PAT

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
