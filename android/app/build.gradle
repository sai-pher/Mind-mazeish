plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Load release signing properties from key.properties (gitignored).
// In CI, populate via environment variables: KEYSTORE_PATH, KEYSTORE_PASSWORD,
// KEY_ALIAS, KEY_PASSWORD.
def keyPropertiesFile = rootProject.file("key.properties")
def keyProperties = new Properties()
if (keyPropertiesFile.exists()) {
    keyPropertiesFile.withInputStream { keyProperties.load(it) }
} else {
    keyProperties["storeFile"]     = System.getenv("KEYSTORE_PATH")     ?: ""
    keyProperties["storePassword"] = System.getenv("KEYSTORE_PASSWORD") ?: ""
    keyProperties["keyAlias"]      = System.getenv("KEY_ALIAS")         ?: ""
    keyProperties["keyPassword"]   = System.getenv("KEY_PASSWORD")      ?: ""
}

android {
    namespace = "com.mindmaze.mind_maze"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    signingConfigs {
        release {
            storeFile     keyProperties["storeFile"] ? file(keyProperties["storeFile"]) : null
            storePassword keyProperties["storePassword"] as String
            keyAlias      keyProperties["keyAlias"] as String
            keyPassword   keyProperties["keyPassword"] as String
        }
    }

    defaultConfig {
        applicationId = "com.mindmaze.mind_maze"
        minSdk = 26
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
        }
        debug {
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
